name: Runner Garbage Collector
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete idle runners older than 55 min
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          ORG: ${{ github.repository_owner }}
        run: |
          date +%s
          
          RUNNERS=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/$ORG/actions/runners" \
            | jq -r '.runners[] | select(.name | startswith("gh-runner-"))| select(.status=="online") | select(.busy==false) | .id')

          for RUNNER_ID in $RUNNERS; do
            NAME=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/orgs/$ORG/actions/runners/$RUNNER_ID" \
              | jq -r '.name')

            SERVER=$(curl -s \
              -H "Authorization: Bearer $HCLOUD_TOKEN" \
              "https://api.hetzner.cloud/v1/servers?name=$NAME" \
              | jq '.servers[0]')

            SERVER_ID=$(echo $SERVER | jq -r '.id')
            CREATED=$(echo $SERVER | jq -r '.created')

            if [ "$SERVER_ID" = "null" ] || [ -z "$SERVER_ID" ]; then
              echo "No Hetzner server found for runner $NAME, skipping"
              continue
            fi

            AGE=$(( $(date +%s) - $(date -d "$CREATED" +%s) ))
            echo "Runner $NAME age: ${AGE}s, idle: true"

            if [ "$AGE" -gt 3300 ]; then
              echo "→ Deleting $NAME"
              curl -s -X DELETE \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/orgs/$ORG/actions/runners/$RUNNER_ID"
              curl -s -X DELETE \
                -H "Authorization: Bearer $HCLOUD_TOKEN" \
                "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
            fi
          done