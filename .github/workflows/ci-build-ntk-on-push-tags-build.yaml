name: CI Build NTK on Push
on:
  workflow_call:

jobs:
  linter:
    name: Linter
    runs-on: hetzner
    environment: ${{ inputs.environment }}
    outputs:
      LINTER_CHECK: ${{ steps.linter_res.outputs.LINTER_CHECK }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve lint plan
        id: lint_plan
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          set_output() {
            local key="$1"
            shift || true
            {
              echo "${key}<<EOF"
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          strategy="other"
          set_output bootstrap_command ""
          set_output install_command ""
          set_output lint_command ""
          set_output node_options ""
          set_output node_cache ""
          set_output cache_dependency_path ""

          case "$REPO_NAME" in
            novatalks.core)
              strategy="novatalks.core"
              set_output install_command "npm i"
              set_output node_options "--max-old-space-size=4096"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              case "$REF_NAME" in
                build-engine)
                  set_output lint_command "npx eslint apps/engine libs/common libs/database --ext .ts"
                  ;;
                build-reporting)
                  set_output lint_command "npx eslint apps/reporting libs/common libs/database --ext .ts"
                  ;;
                *)
                  set_output lint_command "npm run lint"
                  ;;
              esac
              ;;
            novatalks.ui)
              strategy="novatalks.ui"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npx eslint --ext .js,.vue --ignore-path .eslintignore src"
              ;;
            novatalks.dialer)
              strategy="novatalks.dialer"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npx eslint \"{src,apps,libs,test}/**/*.ts\""
              ;;
            nova.chatsconnector.whatsapp-client-api)
              strategy="nova.chatsconnector.whatsapp-client-api"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            nova.chatsconnector.telegram-client-api)
              strategy="nova.chatsconnector.telegram-client-api"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            nova.botflow)
              strategy="nova.botflow"
              set_output install_command "npm ci"
              set_output node_cache "npm"
              set_output cache_dependency_path "package-lock.json"
              set_output lint_command "npm run lint"
              ;;
            novatalks.uspacy.connector)
              strategy="novatalks.uspacy.connector"
              set_output install_command "npm install"
              set_output lint_command "npm run eslint"
              ;;
            *)
              strategy="other"
              set_output bootstrap_command "npm install -g yarn"
              set_output install_command "yarn add eslint-plugin-security
          yarn add @typescript-eslint/eslint-plugin"
              set_output lint_command "npx eslint --ext .js,.vue,.ts . --quiet"
              ;;
          esac

          set_output strategy "$strategy"
          echo "Selected lint strategy: $strategy"

      - name: 💿 Setup Node.js with npm cache
        if: ${{ steps.lint_plan.outputs.node_cache == 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: ${{ steps.lint_plan.outputs.cache_dependency_path }}

      - name: 💿 Setup Node.js
        if: ${{ steps.lint_plan.outputs.node_cache != 'npm' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Prepare lint toolchain
        if: ${{ steps.lint_plan.outputs.bootstrap_command != '' }}
        run: |
          ${{ steps.lint_plan.outputs.bootstrap_command }}

      - name: Install deps for lint
        if: ${{ steps.lint_plan.outputs.install_command != '' }}
        run: |
          ${{ steps.lint_plan.outputs.install_command }}

      - name: Run lint
        id: linter
        if: ${{ steps.lint_plan.outputs.lint_command != '' }}
        env:
          NODE_OPTIONS: ${{ steps.lint_plan.outputs.node_options }}
        run: |
          ${{ steps.lint_plan.outputs.lint_command }}

      # ======== end ========
      - name: End Linter Step
        if: always()
        id: linter_res
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "LINTER_CHECK=✅" | tee -a "$GITHUB_OUTPUT"
          else
            echo "LINTER_CHECK=❌" | tee -a "$GITHUB_OUTPUT"
          fi

  build-image:
    name: Build Image
    runs-on: hetzner
    environment: ${{ inputs.environment }}
    # permissions:
    #   contents: read
    #   packages: write
    if: always()
    needs: [linter]
    outputs:
      REP_NAME: ${{ steps.prep.outputs.REP_NAME }}
      SHORT_SHA: ${{ steps.prep.outputs.SHORT_SHA }}
      SHORT_REF_NAME: ${{ steps.prep.outputs.SHORT_REF_NAME }}
      RELEASE: ${{ steps.prep.outputs.RELEASE }}
      END_STEP_JOB_ID: ${{ steps.end_step.outputs.END_STEP_JOB_ID }}
      IMAGE_SUFFIX: ${{ steps.set_dockerfile.outputs.IMAGE_SUFFIX }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Vars
        id: prep
        run: |
          echo "REP_NAME=`echo ${GITHUB_REPOSITORY} | cut -d "/" -f2 `" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          echo "RELEASE=`echo $(date +'%Y_R%q')`" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          if [[ ${{ github.ref_type }} == 'branch' ]]; then
            echo "SHORT_REF_NAME=`echo ${{ github.ref_name }}`" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          else
            echo "SHORT_REF_NAME=`echo ${{ github.event.base_ref }} | cut -d "/" -f3`" | tee -a $GITHUB_ENV $GITHUB_OUTPUT
          fi

      - name: Delete Tag
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          #delete_release: false # default: false
          tag_name: ${{ github.ref_name }} # tag name to delete
          github_token: ${{ secrets.GITHUB_TOKEN }}
          #repo: ${{ github.repository_owner }}/${{ env.REP_NAME }} # target repo (optional). defaults to repo running this action

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          #username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to DockerHub Container Registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.CR_DH_USERNAME }}
          password: ${{ secrets.CR_DH_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: --debug
          driver-opts: network=host
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
            [grpc]
              max-recv-msg-size = 104857600
              max-send-msg-size = 104857600

      - name: Set Dockerfile path and image suffix
        id: set_dockerfile
        run: |
          if [[ "${{ github.ref_name }}" == "build-engine" ]]; then
            echo "DOCKERFILE_PATH=./docker/engine.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_engine" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_engine" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "build-reporting" ]]; then
            echo "DOCKERFILE_PATH=./docker/reporting.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_reporting" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_reporting" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "build-restore-historical" ]]; then
            echo "DOCKERFILE_PATH=./docker/restore-historical.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_restore-historical" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_restore-historical" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "build-message-source-id" ]]; then
            echo "DOCKERFILE_PATH=./docker/message-source-id.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_migrate-message-source-id" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=_migrate-message-source-id" >> $GITHUB_OUTPUT
          else
            echo "DOCKERFILE_PATH=./docker/server.Dockerfile" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=" >> $GITHUB_ENV
            echo "IMAGE_SUFFIX=" >> $GITHUB_OUTPUT
          fi

      - name: Resolve Docker cache policy
        id: cache_policy
        env:
          REPO_NAME: ${{ env.REP_NAME }}
          IMAGE_SUFFIX: ${{ env.IMAGE_SUFFIX }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          BASE_REF: ${{ github.event.base_ref }}
        run: |
          set -euo pipefail

          set_output() {
            local key="$1"
            shift || true
            {
              echo "${key}<<EOF"
              printf '%s\n' "$@"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          }

          cache_ref="type=registry,ref=ghcr.io/${{ github.repository_owner }}/${REPO_NAME}:buildcache${IMAGE_SUFFIX}"
          source_branch="$REF_NAME"

          if [[ "$REF_TYPE" != "branch" && -n "$BASE_REF" ]]; then
            source_branch="${BASE_REF#refs/heads/}"
          fi

          cache_to="${cache_ref},mode=max"
          case "$source_branch" in
            master|development|main)
              ;;
            *)
              cache_to=""
              ;;
          esac

          set_output source_branch "$source_branch"
          set_output cache_from "$cache_ref"
          set_output cache_to "$cache_to"

          echo "Selected cache source branch: $source_branch"
          if [[ -n "$cache_to" ]]; then
            echo "Cache export enabled."
          else
            echo "Cache export disabled for this build."
          fi

      - name: Build and push
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1
          CACHE_TO: ${{ steps.cache_policy.outputs.cache_to }}
          CACHE_FROM: ${{ steps.cache_policy.outputs.cache_from }}
          TAG_DH: ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}
          TAG_GHCR: ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}
        run: |
          set -euo pipefail

          build_args=(
            --builder "${{ steps.buildx.outputs.name }}"
            --file "${{ env.DOCKERFILE_PATH }}"
            --target main
            --pull
            --push
            --cache-from "$CACHE_FROM"
            --tag "$TAG_DH"
            --tag "$TAG_GHCR"
            .
          )

          if [[ -n "$CACHE_TO" ]]; then
            build_args+=(--cache-to "$CACHE_TO")
          fi

          for attempt in 1 2 3; do
            echo "Build attempt $attempt..."
            docker buildx build "${build_args[@]}" && break
            echo "Attempt $attempt failed."
            [ "$attempt" -lt 3 ] && sleep 20
          done

      - name: Add latest tag on master DOCKER
        if: ${{ contains( github.event.base_ref, 'master' ) }}
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:latest \
            ${{ secrets.CR_DH_USERNAME }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}

      - name: Add latest tag on master GHCR
        if: ${{ contains( github.event.base_ref, 'master' ) }}
        env:
          BUILDX_BUILDER: ${{ steps.buildx.outputs.name }}
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:latest \
            ghcr.io/${{ github.repository_owner }}/${{ env.REP_NAME }}:${{ env.RELEASE }}_${{ env.SHORT_REF_NAME }}${{ env.IMAGE_SUFFIX }}_${{ env.SHORT_SHA }}

      - name: End Step On Failure
        if: failure()
        id: end_step
        run: echo "END_STEP_JOB_ID=`echo ${{ github.run_id }}`" | tee -a $GITHUB_OUTPUT

